<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توليد الشهادات</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>مدرسة الشيخ جلته العربية</h1>
        <h2>توليد الشهادات</h2>
    </header>

    <main>
        <form id="cert-form">
            <fieldset>
                <legend>بيانات الشهادات</legend>

                <label>الفترة الدراسية</label>
                <select id="semester">
                    <option value="الاولى">الفترة الأولى</option>
                    <option value="الثانية">الفترة الثانية</option>
                    <option value="الاخيرة">الفترة الثالثة</option>
                </select>

                <label>العام الدراسي</label>
                <input type="text" id="academicYear" placeholder="2025-2026" required>

                <label>تاريخ الإصدار</label>
                <input type="date" id="issueDate" required>
            </fieldset>

            <button type="submit">توليد الشهادات</button>
        </form>
    </main>

    <script>
        document.getElementById('cert-form')
            .addEventListener('submit', async (e) => {
                e.preventDefault();

                const data = {
                    semester:     document.getElementById('semester').value,
                    academicYear: document.getElementById('academicYear').value,
                    issueDate:    document.getElementById('issueDate').value,
                };

                const res = await fetch('/api/v1/grades/certificates', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `شهادات-${data.semester}-${data.academicYear}.docx`;
                    a.click();
                } else {
                    const result = await res.json();
                    alert(result.message);
                }
            });
    </script>
</body>
</html>
